<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Jména</title>

  <link rel="stylesheet" href="style.css">

  <style>
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed; /* ← DŮLEŽITÉ */
    }

    th, td {
      border: 1px solid #ccc;
      padding: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* centrování úzkých sloupců */
    th:first-child,
    th:last-child,
    td:first-child,
    td:last-child {
      text-align: center;
    }

    .male { color: #2bbfff; }
    .female { color: #ff4fa3; }
    .neutral { color: #777; }
  </style>
</head>
<body>

<h2 id="random"></h2>

<!-- ✔ JEDEN WRAPPER PRO VŠECHNY FILTRY -->
<div class="topbar">

  <div>
    <select id="gender">
      <option>Vše</option>
      <option>Chlapecká</option>
      <option>Dívčí</option>
      <option>Chlapecká + N</option>
      <option>Dívčí + N</option>
      <option>Neutrální</option>
    </select>

    <input id="start" placeholder="Začíná na">
    <input id="not_end" placeholder="Nekončí na">
    <input id="contains" placeholder="Obsahuje">
    <input id="not_contains" placeholder="Neobsahuje">

    <input id="min_len" placeholder="Min. počet písmen">
    <input id="max_len" placeholder="Max. počet písmen">
    <input id="exact_len" placeholder="Přesný počet písmen">

    <label><input type="checkbox" id="no_diacritics"> Bez diakritiky</label>
    <label><input type="checkbox" id="cz_only"> CZ znaky</label>
    <label><input type="checkbox" id="allow_double" checked> Zdvojené znaky</label>

    <button onclick="randomPick()">Náhodné</button>
  </div>

  <div>
    <input id="sur_m" placeholder="Chlapecké příjmení">
    <input id="sur_f" placeholder="Dívčí příjmení">

    <button onclick="toggleWhite()">⭐ Oblíbené</button>
    <button onclick="toggleBlack()">❌ Veto</button>

    <select id="list_filter">
      <option>Vše</option>
      <option>Oblíbené</option>
      <option>Veto</option>
    </select>

    <button id="exportBtn" onclick="exportLists()" style="display:none">
      Export
    </button>

  </div>

</div>

<table>
  <!-- ✅ PEVNÉ ROZDĚLENÍ ŠÍŘKY -->
  <colgroup>
    <col style="width:10%">   <!-- Pohlaví -->
    <col style="width:30%">  <!-- Jméno -->
    <col style="width:50%">  <!-- Celé jméno -->
    <col style="width:10%">  <!-- ★ -->
  </colgroup>

  <thead>
    <tr>
      <th>Pohlaví</th>
      <th>Jméno</th>
      <th>Celé jméno</th>
      <th>★</th>
    </tr>
  </thead>

  <tbody id="table"></tbody>
</table>

<script src="script.js"></script>

</body>
</html>
